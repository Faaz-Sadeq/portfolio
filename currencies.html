<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ارسال حوالة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Cairo', sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.box{
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input,select,button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#2d89ef;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#1b5fbf;
}
a{
    display:block;
    margin-top:15px;
    text-align:center;
}
</style>
</head>
<body>

<div class="box">
<h3>ارسال حوالة</h3>

<input type="text" placeholder="اسم المستلم">
<input type="text" placeholder="رقم جوالة">
<input type="number" placeholder="المبلغ">
<select>
<option>اختر العملة</option>
<option>ريال يمني</option>
<option>دولار</option>
<option>سعودي</option>
</select>

<button>تأكيد الارسال</button>

<a href="index.html">⬅ العودة للرئيسية</a>
</div>

</body>
</html>
