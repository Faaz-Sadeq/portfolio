<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الصراف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family: 'Cairo', sans-serif;
    background:#eef2f7;
}
.header{
    background:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.container{
    padding:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}
.card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    transition:0.3s;
    cursor:pointer;
    text-decoration:none;
    color:black;
}
.card:hover{
    transform:translateY(-5px);
}
.card i{
    font-size:35px;
    margin-bottom:10px;
    display:block;
}
</style>
</head>

<body>

<div class="header">نظام الصراف</div>

<div class="container">

<a href="receive.html" class="card">
<i class="fa-solid fa-envelope-open-text"></i>
استلام حوالة
</a>

<a href="send.html" class="card">
<i class="fa-solid fa-paper-plane"></i>
ارسال حوالة
</a>

<a href="qayd.html" class="card">
<i class="fa-solid fa-right-left"></i>
قيد بسيط
</a>

<a href="receipt.html" class="card">
<i class="fa-solid fa-money-bill-transfer"></i>
سند قبض
</a>

<a href="payment.html" class="card">
<i class="fa-solid fa-file-invoice-dollar"></i>
سند صرف
</a>

<a href="currencies.html" class="card">
<i class="fa-solid fa-globe"></i>
العملات
</a>

<a href="reports.html" class="card">
<i class="fa-solid fa-chart-line"></i>
التقارير
</a>

<a href="settings.html" class="card">
<i class="fa-solid fa-sliders"></i>
الضبط
</a>

<a href="users.html" class="card">
<i class="fa-solid fa-users"></i>
اعداد المستخدمين
</a>

<a href="customers.html" class="card">
<i class="fa-solid fa-address-book"></i>
الحسابات والعملاء
</a>

</div>

</body>
</html>
